<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translator | Premium</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.webrtc-experiment.com/RecordRTC.js"></script>
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-language"></i>
                <h1>AI Translator</h1>
            </div>
            <p class="subtitle">Seamless translation across 50+ languages.</p>
        </header>

        <div class="glass-card translator-app">
            <div class="controls-panel">
                <div class="select-wrapper">
                    <select id="sourceLang"></select>
                    <i class="fa-solid fa-chevron-down select-icon"></i>
                </div>
                
                <button id="swapBtn" class="icon-btn swap-btn" aria-label="Swap Languages">
                    <i class="fa-solid fa-right-left"></i>
                </button>
                
                <div class="select-wrapper">
                    <select id="targetLang"></select>
                    <i class="fa-solid fa-chevron-down select-icon"></i>
                </div>
            </div>

            <div class="translation-grid">
                <div class="text-panel source-panel">
                    <div id="listeningOverlay" class="loading-overlay listening-overlay">
                        <div class="pulsating-mic"><i class="fa-solid fa-microphone"></i></div>
                        <span>Listening...</span>
                        <div class="overlay-actions" style="margin-top: 15px; display: flex; gap: 10px;">
                            <button id="stopRecordBtn" class="primary-btn" style="padding: 0.5rem 1.5rem; font-size: 1rem; border-radius: 8px;"><i class="fa-solid fa-stop"></i> Stop</button>
                            <button id="cancelRecordBtn" class="icon-btn" style="background: rgba(255,255,255,0.1); color: white; border-radius: 8px;" title="Cancel"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                    <textarea id="inputText" placeholder="Type or paste text here..."></textarea>
                    <div class="panel-footer">
                        <span class="char-count" id="charCount">0</span>
                        <div class="action-buttons">
                            <button id="recordBtn" class="icon-btn mic-btn" title="Record Audio"><i class="fa-solid fa-microphone"></i></button>
                            <button class="icon-btn" onclick="speakText('inputText')" title="Listen"><i class="fa-solid fa-volume-high"></i></button>
                            <button class="icon-btn" onclick="copyText('inputText')" title="Copy"><i class="fa-regular fa-copy"></i></button>
                            <button class="icon-btn" onclick="clearText('inputText')" title="Clear"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                </div>

                <div class="text-panel target-panel">
                    <div id="loading" class="loading-overlay">
                        <div class="spinner"></div>
                        <span>Translating...</span>
                    </div>
                    <textarea id="outputText" placeholder="Translation will appear here..." readonly></textarea>
                    <div class="panel-footer">
                        <div class="spacer"></div>
                        <div class="action-buttons">
                            <button class="icon-btn" onclick="speakText('outputText')" title="Listen"><i class="fa-solid fa-volume-high"></i></button>
                            <button class="icon-btn" onclick="copyText('outputText')" title="Copy"><i class="fa-regular fa-copy"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-action">
                <button id="translateBtn" class="primary-btn">
                    <i class="fa-solid fa-bolt"></i> Translate Now
                </button>
            </div>
        </div>
    </main>
    
    <div id="toast" class="toast">Copied to clipboard!</div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
